<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palermo Codeina - Beats</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <header class="profile-header">
        <div class="user-avatar">
            <img src="PALERMO CODEINA LOGO.jpg" alt="User Profile">
        </div>
        <h1 class="glitch-text">Palermo Codeina</h1>
    </header>

    <main class="container">
        <section class="beat-grid">
            <div class="beat-card">
                <div class="beat-info">
                    <span class="beat-number">01</span>
                    <h3>Audio 1</h3>
                    <p class="tag">@palermocodeina</p>
                </div>
                
                <div class="player-controls">
                    <button class="play-btn" data-audio="PCBEAT1.mp3">▶</button>
                    <div class="track-info">
                        <input type="range" class="seek-bar" value="0" min="0" step="1">
                        <div class="time-stamps">
                            <span class="curr-time">0:00</span>
                            <span class="dur-time">0:00</span>
                        </div>
                    </div>
                </div>

                <button class="reserve-btn" data-link="https://mpago.la/TU_LINK">Reservar</button>
                <audio id="audio1" src="audio1.mp3"></audio>
            </div>

            <div class="beat-card">
                <div class="beat-info">
                    <span class="beat-number">02</span>
                    <h3>Audio 2</h3>
                    <p class="tag">@palermo.codeina</p>
                </div>
                <div class="player-controls">
                    <button class="play-btn" data-audio="PCBEAT2.mp3">▶</button>
                    <div class="track-info">
                        <input type="range" class="seek-bar" value="0" min="0" step="1">
                        <div class="time-stamps">
                            <span class="curr-time">0:00</span>
                            <span class="dur-time">0:00</span>
                        </div>
                    </div>
                </div>
                <button class="reserve-btn" data-link="https://mpago.la/TU_LINK">Reservar</button>
                <audio id="audio2" src="audio2.mp3"></audio>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
